[build]
  command = "npm run build"
  publish = "out"

# Redirect the exact /aurora path
[[redirects]]
  from = "/aurora"
  to = "https://laurenyip.framer.website/aurora"
  status = 200
  force = true

# Redirect /aurora/anything (for subpages, assets, etc.)
[[redirects]]
  from = "/aurora/*"
  to = "https://laurenyip.framer.website/aurora/:splat"
  status = 200
  force = true

# IMPORTANT: Handle the trailing slash case
[[redirects]]
  from = "/aurora/"
  to = "https://laurenyip.framer.website/aurora"
  status = 200
  force = true