[build]
  command = "npm run build"
  publish = "out"

# Rule for /aurora (no trailing slash)
[[redirects]]
  from = "/aurora"
  to = "https://laurenyip.framer.website/aurora"
  status = 200
  force = true

# Rule for /aurora/anything (with trailing slash)
[[redirects]]
  from = "/aurora/*"
  to = "https://laurenyip.framer.website/aurora/:splat"
  status = 200
  force = true